<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Banner de canal YouTube — Las 5 caras del día</title>
<style>
/* =====================================================================
   LAS 5 CARAS DEL DÍA — Sistema de marca (CSS base)
   Noticias rápidas. Resumidas. Sin rollos.
   Importa este archivo en cualquier plantilla para heredar la marca.
   ===================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;900&family=Montserrat:wght@600;700;800;900&display=swap');

:root {
  /* --- Color de marca --- */
  --c-yellow:      #FFE000;
  --c-yellow-deep: #FFC400;
  --c-black:       #0D0D0D;
  --c-pure-black:  #000000;
  --c-white:       #FFFFFF;

  /* --- Neutros --- */
  --c-surface:  #141414;
  --c-surface-2:#1F1F1F;
  --c-line:     #2B2B2B;
  --c-muted:    #B3B3B3;

  /* --- Acentos por categoría --- */
  --cat-ultima-hora: #FF2D2D;
  --cat-exclusiva:   #FFE000;
  --cat-trending:    #FF2E88;
  --cat-deportes:    #00C24A;
  --cat-musica:      #8B5CF6;
  --cat-television:  #2E8BFF;
  --cat-famosos:     #FF7A00;
  --cat-viral:       #FF4D00;

  /* --- Tipografía --- */
  --f-display: 'Anton', 'Archivo Black', Impact, sans-serif;
  --f-text:    'Inter', 'Helvetica Neue', Arial, sans-serif;
  --f-label:   'Montserrat', 'Inter', sans-serif;

  /* --- Forma --- */
  --r-sm: 8px;
  --r-md: 16px;
  --r-pill: 999px;

  /* --- Efectos --- */
  --scrim: linear-gradient(to top, rgba(0,0,0,.92) 0%, rgba(0,0,0,.65) 32%, rgba(0,0,0,0) 62%);
  --shadow-text: 0 2px 8px rgba(0,0,0,.55);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body { background: #555; }

/* =====================================================================
   LIENZO — cada plantilla vive dentro de .canvas con un tamaño nativo
   ===================================================================== */
.canvas {
  position: relative;
  overflow: hidden;
  background: var(--c-black);
  color: var(--c-white);
  font-family: var(--f-text);
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}
.canvas--carousel { width: 1080px; height: 1350px; }
.canvas--reel     { width: 1080px; height: 1920px; }
.canvas--square   { width: 1080px; height: 1080px; }
.canvas--yt       { width: 1280px; height: 720px; }
.canvas--banner   { width: 2560px; height: 1440px; }

/* =====================================================================
   FOTOGRAFÍA (campo editable: data-field="foto")
   ===================================================================== */
.photo {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  background-repeat: no-repeat;
}
.photo--top { background-position: center top; }
.scrim { position: absolute; inset: 0; background: var(--scrim); pointer-events: none; }
.scrim--full { background: linear-gradient(to top, rgba(0,0,0,.94) 8%, rgba(0,0,0,.35) 55%, rgba(0,0,0,.55) 100%); }

/* =====================================================================
   TIPOGRAFÍA DE IMPACTO
   ===================================================================== */
.kicker {                 /* etiqueta corta sobre el titular */
  font-family: var(--f-label);
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
}
.headline {               /* TITULAR (campo: data-field="titular") */
  font-family: var(--f-display);
  font-weight: 400;       /* Anton ya es black */
  line-height: .96;
  letter-spacing: .005em;
  text-transform: uppercase;
}
.headline--tight { line-height: .9; }
.subhead {                /* SUBTÍTULO (campo: data-field="subtitulo") */
  font-family: var(--f-text);
  font-weight: 500;
  line-height: 1.28;
  color: #EDEDED;
}
.date {                   /* FECHA (campo: data-field="fecha") */
  font-family: var(--f-label);
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.text-shadow { text-shadow: var(--shadow-text); }
.hl-yellow { color: var(--c-yellow); }
.hl-black  { color: var(--c-black); }

/* =====================================================================
   BADGE / ETIQUETA DE CATEGORÍA  (recurso gráfico)
   Uso: <span class="badge" data-cat="deportes">DEPORTES</span>
   Por defecto = amarillo/negro (convención de marca). data-cat tiñe el fondo.
   ===================================================================== */
.badge {
  display: inline-flex; align-items: center; gap: .5em;
  font-family: var(--f-label);
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--c-black);
  background: var(--c-yellow);
  padding: .5em 1em;
  border-radius: var(--r-pill);
  line-height: 1;
  white-space: nowrap;
}
.badge--square { border-radius: var(--r-sm); }
.badge--outline { background: transparent; color: var(--c-yellow); box-shadow: inset 0 0 0 3px var(--c-yellow); }

.badge[data-cat="ultima-hora"] { background: var(--cat-ultima-hora); color: #fff; }
.badge[data-cat="exclusiva"]   { background: var(--cat-exclusiva);   color: var(--c-black); }
.badge[data-cat="trending"]    { background: var(--cat-trending);    color: #fff; }
.badge[data-cat="deportes"]    { background: var(--cat-deportes);    color: #fff; }
.badge[data-cat="musica"]      { background: var(--cat-musica);      color: #fff; }
.badge[data-cat="television"]  { background: var(--cat-television);  color: #fff; }
.badge[data-cat="famosos"]     { background: var(--cat-famosos);     color: #fff; }
.badge[data-cat="viral"]       { background: var(--cat-viral);       color: #fff; }

/* Punto/pulso de "EN DIRECTO" para última hora */
.live-dot { width: .7em; height: .7em; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 0 rgba(255,255,255,.6); animation: pulse 1.4s infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,255,255,.5)} 70%{box-shadow:0 0 0 .8em rgba(255,255,255,0)} 100%{box-shadow:0 0 0 0 rgba(255,255,255,0)} }

/* =====================================================================
   ELEMENTOS DE MARCA — barra amarilla, rayas de velocidad, nº de slide
   ===================================================================== */
.bar-yellow { background: var(--c-yellow); }
.rule { height: 6px; background: var(--c-yellow); border: none; }

.speed-streaks { display: inline-flex; flex-direction: column; gap: 7px; }
.speed-streaks i { display: block; height: 8px; background: var(--c-yellow); border-radius: 4px; transform: skewX(-20deg); }
.speed-streaks i:nth-child(1){ width: 70px; }
.speed-streaks i:nth-child(2){ width: 46px; }
.speed-streaks i:nth-child(3){ width: 26px; }

.slide-number {           /* nº grande de slide de noticia */
  font-family: var(--f-display);
  color: var(--c-yellow);
  line-height: .8;
  font-size: 360px;
}

.swipe {                  /* "DESLIZA PARA VERLAS →" */
  display: inline-flex; align-items: center; gap: .6em;
  font-family: var(--f-label); font-weight: 800;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--c-yellow);
}
.swipe svg { width: 1.3em; height: 1.3em; }

/* =====================================================================
   RÓTULO (lower-third) — recurso gráfico para vídeo/portadas
   ===================================================================== */
.lower-third { display: inline-flex; flex-direction: column; }
.lower-third .lt-name { font-family: var(--f-display); text-transform: uppercase; background: var(--c-yellow); color: var(--c-black); padding: .12em .5em; line-height: 1; align-self: flex-start; }
.lower-third .lt-role { font-family: var(--f-text); font-weight: 600; background: var(--c-black); color: #fff; padding: .5em .7em; align-self: flex-start; }

/* Utilidades de layout */
.stack { display: flex; flex-direction: column; }
.row   { display: flex; align-items: center; }
.fill  { flex: 1; }

</style>
<style>
  .banner { background:radial-gradient(120% 120% at 50% 0%, #1c1c1c 0%, #0D0D0D 60%); }
  /* Rayas de velocidad decorativas */
  .banner .streak { position:absolute; height:18px; background:var(--c-yellow); border-radius:9px; transform:skewX(-20deg); opacity:.9; }
  .banner .s1{ top:300px; left:120px; width:420px; }
  .banner .s2{ top:340px; left:120px; width:260px; opacity:.6; }
  .banner .s3{ bottom:320px; right:120px; width:420px; }
  .banner .s4{ bottom:360px; right:240px; width:260px; opacity:.6; }

  /* Safe area centrada (1546x423) */
  .banner .safe { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
     width:1546px; height:423px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; }
  .banner .logo { width:620px; height:auto; }
  .banner .tagline { font-family:var(--f-display); text-transform:uppercase; color:#fff; font-size:58px; letter-spacing:.02em; }
  .banner .tagline b { color:var(--c-yellow); }
  .banner .icons { display:flex; gap:34px; margin-top:4px; }
  .banner .icons span { width:58px; height:58px; color:var(--c-yellow); }
  .banner .icons svg { width:100%; height:100%; }
  /* Marca de safe-area (sólo guía, no exportar) */
  .banner .safe-guide { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
     width:1546px; height:423px; outline:2px dashed rgba(255,224,0,.35); pointer-events:none; }
</style>
</head>
<body>
<section class="canvas canvas--banner banner" data-document-role="page" data-label="Banner YouTube">
  <i class="streak s1"></i><i class="streak s2"></i><i class="streak s3"></i><i class="streak s4"></i>

  <div class="safe">
    <img class="logo" src="https://raw.githubusercontent.com/alvarogpp12/las5caras-design-system/master/assets/logo/logo.png" alt="Las 5 caras del día">
    <div class="tagline">Noticias rápidas. <b>Resumidas.</b> Sin rollos.</div>
    <div class="icons">
      <span><svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 6l12.4 25.1 27.7 4-20 19.5 4.7 27.6L50 69.2 25.2 82.2l4.7-27.6-20-19.5 27.7-4z"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="7"><circle cx="50" cy="50" r="40"/><ellipse cx="50" cy="50" rx="18" ry="40"/><line x1="11" y1="36" x2="89" y2="36"/><line x1="11" y1="64" x2="89" y2="64"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="currentColor"><path d="M44 26 22 12a5 5 0 0 0-6 8l13 9H24a8 8 0 0 0-8 8v37a8 8 0 0 0 8 8h52a8 8 0 0 0 8-8V37a8 8 0 0 0-8-8H61l13-9a5 5 0 0 0-6-8L46 26z"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="currentColor"><path d="M82 14a4 4 0 0 0-5-4L40 21a5 5 0 0 0-4 5v40a16 16 0 1 0 8 14V40l30-9v23a16 16 0 1 0 8 14z"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="7"><circle cx="50" cy="50" r="40"/><path d="M50 28l17 12-6 20H39l-6-20z" fill="currentColor" stroke="none"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 6c4 16-6 24-14 32C28 46 22 54 22 66a28 28 0 0 0 56 0c0-14-8-22-14-30-3 6-7 9-11 9 6-14-3-30-3-39z"/></svg></span>
    </div>
  </div>
  <div class="safe-guide" data-export="ignore"></div>
</section>
</body>
</html>
