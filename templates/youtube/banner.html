<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Banner de canal YouTube — Las 5 caras del día</title>
<link rel="stylesheet" href="../../brand/brand.css">
<style>
  .banner { background:radial-gradient(120% 120% at 50% 0%, #1c1c1c 0%, #0D0D0D 60%); }
  /* Rayas de velocidad decorativas */
  .banner .streak { position:absolute; height:18px; background:var(--c-yellow); border-radius:9px; transform:skewX(-20deg); opacity:.9; }
  .banner .s1{ top:300px; left:120px; width:420px; }
  .banner .s2{ top:340px; left:120px; width:260px; opacity:.6; }
  .banner .s3{ bottom:320px; right:120px; width:420px; }
  .banner .s4{ bottom:360px; right:240px; width:260px; opacity:.6; }

  /* Safe area centrada (1546x423) */
  .banner .safe { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
     width:1546px; height:423px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; }
  .banner .logo { width:620px; height:auto; }
  .banner .tagline { font-family:var(--f-display); text-transform:uppercase; color:#fff; font-size:58px; letter-spacing:.02em; }
  .banner .tagline b { color:var(--c-yellow); }
  .banner .icons { display:flex; gap:34px; margin-top:4px; }
  .banner .icons span { width:58px; height:58px; color:var(--c-yellow); }
  .banner .icons svg { width:100%; height:100%; }
  /* Marca de safe-area (sólo guía, no exportar) */
  .banner .safe-guide { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
     width:1546px; height:423px; outline:2px dashed rgba(255,224,0,.35); pointer-events:none; }
</style>
</head>
<body>
<section class="canvas canvas--banner banner" data-document-role="page" data-label="Banner YouTube">
  <i class="streak s1"></i><i class="streak s2"></i><i class="streak s3"></i><i class="streak s4"></i>

  <div class="safe">
    <img class="logo" src="../../assets/logo/logo.svg" alt="Las 5 caras del día">
    <div class="tagline">Noticias rápidas. <b>Resumidas.</b> Sin rollos.</div>
    <div class="icons">
      <span><svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 6l12.4 25.1 27.7 4-20 19.5 4.7 27.6L50 69.2 25.2 82.2l4.7-27.6-20-19.5 27.7-4z"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="7"><circle cx="50" cy="50" r="40"/><ellipse cx="50" cy="50" rx="18" ry="40"/><line x1="11" y1="36" x2="89" y2="36"/><line x1="11" y1="64" x2="89" y2="64"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="currentColor"><path d="M44 26 22 12a5 5 0 0 0-6 8l13 9H24a8 8 0 0 0-8 8v37a8 8 0 0 0 8 8h52a8 8 0 0 0 8-8V37a8 8 0 0 0-8-8H61l13-9a5 5 0 0 0-6-8L46 26z"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="currentColor"><path d="M82 14a4 4 0 0 0-5-4L40 21a5 5 0 0 0-4 5v40a16 16 0 1 0 8 14V40l30-9v23a16 16 0 1 0 8 14z"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="7"><circle cx="50" cy="50" r="40"/><path d="M50 28l17 12-6 20H39l-6-20z" fill="currentColor" stroke="none"/></svg></span>
      <span><svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 6c4 16-6 24-14 32C28 46 22 54 22 66a28 28 0 0 0 56 0c0-14-8-22-14-30-3 6-7 9-11 9 6-14-3-30-3-39z"/></svg></span>
    </div>
  </div>
  <div class="safe-guide" data-export="ignore"></div>
</section>
</body>
</html>
